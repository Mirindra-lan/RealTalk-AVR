<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket GPLI</title>
    <link rel="stylesheet" href="./src/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="card">
    <h2>Créer un ticket par appel</h2>

    <div class="vad-section">
        <div class="vad-label">Microphone</div>
        <div class="vad-container" id="viz-micro"></div>
    </div>

    <div class="vad-section">
        <div class="vad-label">Bot</div>
        <div class="vad-container" id="viz-remote"></div>
    </div>

    <div class="controls">
        <button id="toggle" style="background-color: green; color:antiquewhite;">
            <i id="icon" class="fa-solid fa-phone"></i>
        </button>

        <div class="gain-control">
            <span>Sensibilité Micro</span>
            <input type="range" id="gain" min="0" max="3" step="0.1" value="1">
        </div>
    </div>

</div>

<script src="./src/app.js">
</script>

</body>
</html>
